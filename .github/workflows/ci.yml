name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build:shared

      - name: Lint
        run: pnpm lint

  build-web:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:web

      - name: Launch web preview and smoke test
        run: |
          pnpm --filter @char-gen/web preview --host 127.0.0.1 --port 3000 > /tmp/web-preview.log 2>&1 &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID"
          }

          trap cleanup EXIT

          for i in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/web-home.html; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/web-home.html
          grep -q '<div id="root"></div>' /tmp/web-home.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/dist
